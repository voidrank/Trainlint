# Kimi port of hansard's hooks. Kimi reads hooks from ~/.kimi/config.toml as a
# flat array `hooks = [ {event, command, matcher, timeout}, ... ]` (kimi_cli/hooks/config.py).
# install-kimi.sh bakes the absolute hansard root + TRAINLINT_HOST=kimi into each
# command and merges these into your ~/.kimi/config.toml (preserving any hooks you
# already have). This file is the reference of WHAT it installs.
#
# Only the channels that survive Kimi's block-only hook model are wired:
#   UserPromptSubmit/PreToolUse/Stop -> router.py   (reject + escalate-by-block + report doorman)
#   PreCompact/SessionEnd            -> harvest.py   (side-effect: capture knowledge before loss)
# SessionStart/compass (flow.py) is NOT wired: it only emits coach context, which
# Kimi drops — see the kimi-output-model decision.
#
# __ROOT__ is replaced with the absolute hansard dir by install-kimi.sh.
hooks = [
  { event = "UserPromptSubmit", command = 'TRAINLINT_HOST=kimi python3 "__ROOT__/hooks/router.py"', matcher = "", timeout = 30 },
  { event = "PreToolUse", command = 'TRAINLINT_HOST=kimi python3 "__ROOT__/hooks/router.py"', matcher = "Shell|WriteFile|StrReplaceFile", timeout = 30 },
  { event = "Stop", command = 'TRAINLINT_HOST=kimi python3 "__ROOT__/hooks/router.py"', matcher = "", timeout = 30 },
  { event = "PreCompact", command = 'TRAINLINT_HOST=kimi python3 "__ROOT__/research/harvest.py"', matcher = "", timeout = 60 },
  { event = "SessionEnd", command = 'TRAINLINT_HOST=kimi python3 "__ROOT__/research/harvest.py"', matcher = "", timeout = 60 },
]
