# Cloudflare Worker: the multi-tenant hansard report service.
# Deploy:  wrangler deploy   (after the setup steps in ../README.md)

name = "hansard-report-server"
main = "src/index.js"
compatibility_date = "2024-11-01"
workers_dev = false

# R2 bucket that stores every tenant's reports, keyed <namespace>/<project>.html
# Create it once:  wrangler r2 bucket create trainlint-reports
[[r2_buckets]]
binding = "REPORTS"
bucket_name = "trainlint-reports"

# Bind the apex domain straight to the Worker (DNS is already on Cloudflare).
[[routes]]
pattern = "secondfoundationlabs.com"
custom_domain = true

# Public config. Fill these from your Cloudflare Access application (Zero Trust dashboard):
#   ACCESS_AUD          = the Access application's Audience (AUD) tag
#   ACCESS_TEAM_DOMAIN  = <your-team>.cloudflareaccess.com
[vars]
ACCESS_AUD = "REPLACE_WITH_ACCESS_APP_AUD_TAG"
ACCESS_TEAM_DOMAIN = "REPLACE_WITH_TEAM.cloudflareaccess.com"
# Admin allow-list (comma-separated, lowercased). Admins may open any /<email>/<project>.html and
# see every registered operator in the dashboard.
ADMIN_EMAILS = "voidrank@gmail.com,cz@2ndf.ai"

# SECRET (never commit): the HMAC key that signs upload tokens.
#   openssl rand -hex 32 | wrangler secret put TOKEN_SIGNING_KEY

# Durable Object: one AgentHub per namespace holds the live relay WebSocket to that operator's box.
[[durable_objects.bindings]]
name = "AGENTS"
class_name = "AgentHub"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AgentHub"]
